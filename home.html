<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <h1 class="title">Gamer Bank</h1>

  <div class="card">

    <h2 id="userNome"></h2>
    <h3>Saldo: <span id="saldo">0</span> WUP</h3>

    <input type="number" id="valor" placeholder="Valor">

    <button class="btn" onclick="depositar()">Depositar</button>
    <button class="btn red" onclick="sacar()">Sacar</button>

    <button class="btn gray" onclick="logout()">Sair</button>

    <p id="msg"></p>

  </div>

</div>

<script src="js/app.js"></script>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let logado = localStorage.getItem("logado");

const userAtual = usuarios.find(u => u.user === logado);

if (!userAtual) {
  window.location.href = "index.html";
}

document.getElementById("userNome").innerText = "Olá, " + userAtual.user;
document.getElementById("saldo").innerText = userAtual.saldo;

function salvar() {
  localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

function atualizar() {
  document.getElementById("saldo").innerText = userAtual.saldo;
}

function depositar() {
  let valor = Number(document.getElementById("valor").value);

  if (valor <= 0) return;

  userAtual.saldo += valor;

  userAtual.historico.push({
    tipo: "Depósito",
    valor: valor,
    data: new Date().toLocaleString()
  });

  salvar();
  atualizar();
}

function sacar() {
  let valor = Number(document.getElementById("valor").value);

  if (valor <= 0) return;

  if (userAtual.saldo < valor) {
    document.getElementById("msg").innerText = "Saldo insuficiente";
    return;
  }

  userAtual.saldo -= valor;

  userAtual.historico.push({
    tipo: "Saque",
    valor: valor,
    data: new Date().toLocaleString()
  });

  salvar();
  atualizar();
}

function logout() {
  localStorage.removeItem("logado");
  window.location.href = "index.html";
}
</script>

</body>
</html>
