<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <div class="card">

    <!-- FOTO -->
    <img id="foto" class="foto">

    <input type="file" id="upload" accept="image/*">

    <!-- NOME -->
    <h2 id="userNome"></h2>

    <!-- IGG -->
    <p id="igg"></p>

    <!-- CARTÃO -->
    <div class="cartao">
      <p id="numCartao"></p>
    </div>

    <!-- DATA -->
    <p id="data"></p>

    <!-- SALDO -->
    <h3>Saldo: <span id="saldo">0</span> WUP</h3>

    <input type="number" id="valor" placeholder="Valor">

    <button class="btn" onclick="depositar()">Depositar</button>
    <button class="btn red" onclick="sacar()">Sacar</button>

    <button class="btn gray" onclick="logout()">Sair</button>

  </div>

</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let logado = localStorage.getItem("logado");

function gerarNumero() {
  return Math.floor(Math.random() * 900 + 100);
}

function gerarCartao() {
  return `${gerarNumero()}-${gerarNumero()}-${gerarNumero()}-${Math.floor(Math.random()*90+10)}`;
}

function gerarIGG() {
  return 'IGG-' + Math.random().toString(36).substring(2, 10).toUpperCase();
}

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let logado = localStorage.getItem("logado");

const userAtual = usuarios.find(u => u.user === logado);

if (!userAtual) {
  window.location.href = "index.html";
}

/* CORREÇÃO AUTOMÁTICA */
if (!userAtual.igg) userAtual.igg = gerarIGG();
if (!userAtual.cartao) userAtual.cartao = gerarCartao();
if (!userAtual.foto) userAtual.foto = "";

localStorage.setItem("usuarios", JSON.stringify(usuarios));

if (!userAtual) {
  window.location.href = "index.html";
}

/* DADOS */
document.getElementById("userNome").innerText = userAtual.user;
document.getElementById("saldo").innerText = userAtual.saldo;
document.getElementById("igg").innerText = userAtual.igg;
document.getElementById("numCartao").innerText = userAtual.cartao;

/* DATA */
document.getElementById("data").innerText = new Date().toLocaleString();

/* FOTO */
const foto = document.getElementById("foto");

if (userAtual.foto) {
  foto.src = userAtual.foto;
}

document.getElementById("upload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    userAtual.foto = reader.result;
    salvar();
    foto.src = reader.result;
  }

  reader.readAsDataURL(file);
});

/* FUNÇÕES */
function salvar() {
  localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

function atualizar() {
  document.getElementById("saldo").innerText = userAtual.saldo;
}

function depositar() {
  let valor = Number(document.getElementById("valor").value);
  if (valor <= 0) return;

  userAtual.saldo += valor;
  salvar();
  atualizar();
}

function sacar() {
  let valor = Number(document.getElementById("valor").value);
  if (valor <= 0) return;

  if (userAtual.saldo < valor) return;

  userAtual.saldo -= valor;
  salvar();
  atualizar();
}

function logout() {
  localStorage.removeItem("logado");
  window.location.href = "index.html";
}
</script>

</body>
</html>
