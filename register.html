<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <div class="card">

    <h2>Criar Conta</h2>

    <input type="text" id="user" placeholder="Usuário (máx 15)" maxlength="15">
    <input type="password" id="pass" placeholder="Senha (máx 10)" maxlength="10">

    <button class="btn" onclick="criarConta()">Criar Conta</button>

    <button class="btn gray" onclick="voltar()">Voltar</button>

    <p id="msg" class="msg"></p>

  </div>

</div>

<script>
function gerarNumero() {
  return Math.floor(Math.random() * 900 + 100);
}

function gerarCartao() {
  return `${gerarNumero()}-${gerarNumero()}-${gerarNumero()}-${Math.floor(Math.random()*90+10)}`;
}

function gerarIGG() {
  return 'IGG-' + Math.random().toString(36).substring(2, 10).toUpperCase();
}

function criarConta() {
  let user = document.getElementById("user").value.trim();
  let pass = document.getElementById("pass").value.trim();
  let msg = document.getElementById("msg");

  /* VALIDAÇÃO */
  if (!user || !pass) {
    msg.innerText = "Preencha todos os campos";
    msg.style.color = "red";
    return;
  }

  if (!/^[a-zA-Z0-9]+$/.test(user)) {
    msg.innerText = "Usuário só pode ter letras e números";
    msg.style.color = "red";
    return;
  }

  if (!/^[a-zA-Z0-9]+$/.test(pass)) {
    msg.innerText = "Senha só pode ter letras e números";
    msg.style.color = "red";
    return;
  }

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

  if (usuarios.find(u => u.user === user)) {
    msg.innerText = "Usuário já existe";
    msg.style.color = "red";
    return;
  }

  /* CRIAR CONTA */
  usuarios.push({
    user: user,
    pass: pass,
    saldo: 0,
    historico: [],
    igg: gerarIGG(),
    cartao: gerarCartao(),
    foto: ""
  });

  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  msg.innerText = "Conta criada com sucesso!";
  msg.style.color = "green";

  setTimeout(() => {
    window.location.href = "index.html";
  }, 1200);
}

function voltar() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
