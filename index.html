<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamer Bank</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <div class="card">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="mostrarLogin()">Login</button>
      <button class="tab" onclick="irRegistro()">Criar Conta</button>
    </div>

    <!-- LOGIN -->
    <div id="login-box">

      <input type="text" id="loginUser" placeholder="Usuário" maxlength="15">
      <input type="password" id="loginPass" placeholder="Senha" maxlength="10">

      <button class="btn" onclick="login()">Entrar</button>

      <p id="msg" class="msg"></p>

    </div>

  </div>

</div>

<script src="js/app.js"></script>

<script>
function mostrarLogin() {
  // já estamos no login, então nada
}

function irRegistro() {
  window.location.href = "register.html";
}

function login() {
  let user = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;
  let msg = document.getElementById("msg");

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

  let encontrado = usuarios.find(u => u.user === user && u.pass === pass);

  if (!encontrado) {
    msg.innerText = "Usuário ou senha incorretos";
    msg.style.color = "red";
    return;
  }

  localStorage.setItem("logado", user);

  window.location.href = "home.html";
}
</script>

</body>
</html>
