<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
<h2>Empréstimo</h2>

<input id="valor" placeholder="Valor">

<button onclick="pegar()">Pegar</button>
<button onclick="pagar()">Pagar</button>

<p id="divida"></p>

<button onclick="voltar()">Voltar</button>
</div>

<script src="js/app.js"></script>
<script>

function calcular(){
    let e = contas[user].emprestimo;
    if(!e) return 0;

    let dias = Math.floor((Date.now()-e.data)/86400000);
    return e.valor*Math.pow(1.02,dias);
}

function pegar(){
    let v=parseFloat(valor.value);

    contas[user].emprestimo={valor:v,data:Date.now()};
    contas[user].saldo+=v;

    salvar();
}

function pagar(){
    let d=calcular();

    if(contas[user].saldo>=d){
        contas[user].saldo-=d;
        contas[user].emprestimo=null;
        salvar();
    }
}

divida.innerText="Dívida: "+calcular().toFixed(2);

function voltar(){location="home.html";}
</script>

</body>
</html>
