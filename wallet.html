<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<h2>Carteira</h2>

<input id="valor" placeholder="Valor">

<button onclick="depositar()">Depositar</button>
<button onclick="sacar()">Sacar</button>

<button onclick="voltar()">Voltar</button>

</div>

<script src="js/app.js"></script>
<script>
function depositar(){
    let v = parseFloat(valor.value);
    contas[user].saldo+=v;

    contas[user].historico.push({
        id:gerarID(),
        tipo:"deposito",
        valor:v,
        data:data()
    });

    salvar();
}

function sacar(){
    let v = parseFloat(valor.value);

    if(contas[user].saldo>=v){
        contas[user].saldo-=v;

        contas[user].historico.push({
            id:gerarID(),
            tipo:"saque",
            valor:v,
            data:data()
        });

        salvar();
    }
}

function voltar(){location="home.html";}
</script>

</body>
</html>
