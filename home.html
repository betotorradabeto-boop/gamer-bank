<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamer Bank - Home</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <div class="card">

    <!-- HEADER -->
    <div class="user-header">
      <img id="foto" class="foto">
      <div>
        <h2 id="userNome"></h2>
        <p id="igg"></p>
      </div>
    </div>

    <!-- CARTÃO -->
    <div class="cartao">
      <p id="numCartao"></p>
    </div>

    <!-- DATA -->
    <p class="data" id="data"></p>

    <!-- SALDO -->
    <h3>Saldo: <span id="saldo">0</span> WUP</h3>

    <!-- INPUT -->
    <input type="number" id="valor" placeholder="Valor">

    <!-- AÇÕES -->
    <button class="btn" onclick="depositar()">Depositar</button>
    <button class="btn red" onclick="sacar()">Sacar</button>

    <!-- NAV -->
    <div class="nav">
      <button onclick="ir('wallet.html')">Carteira</button>
      <button onclick="ir('loan.html')">Empréstimo</button>
      <button onclick="ir('vault.html')">Cofre</button>
      <button onclick="ir('history.html')">Histórico</button>
    </div>

    <button class="btn gray" onclick="logout()">Sair</button>

    <!-- FOTO -->
    <input type="file" id="upload" accept="image/*">

  </div>

</div>

<script src="js/app.js"></script>

<script>
function gerarNumero() {
  return Math.floor(Math.random() * 900 + 100);
}

function gerarCartao() {
  return `${gerarNumero()}-${gerarNumero()}-${gerarNumero()}-${Math.floor(Math.random()*90+10)}`;
}

function gerarIGG() {
  return 'IGG-' + Math.random().toString(36).substring(2, 10).toUpperCase();
}

/* CARREGAR USUÁRIO */
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let logado = localStorage.getItem("logado");

const userAtual = usuarios.find(u => u.user === logado);

if (!userAtual) {
  window.location.href = "index.html";
}

/* AUTO FIX */
if (!userAtual.saldo) userAtual.saldo = 0;
if (!userAtual.igg) userAtual.igg = gerarIGG();
if (!userAtual.cartao) userAtual.cartao = gerarCartao();
if (!userAtual.foto) userAtual.foto = "";

salvar();

/* UI */
document.getElementById("userNome").innerText = userAtual.user;
document.getElementById("saldo").innerText = userAtual.saldo;
document.getElementById("igg").innerText = userAtual.igg;
document.getElementById("numCartao").innerText = userAtual.cartao;
document.getElementById("data").innerText = new Date().toLocaleString();

/* FOTO */
const foto = document.getElementById("foto");

if (userAtual.foto) {
  foto.src = userAtual.foto;
} else {
  foto.src = "https://via.placeholder.com/100";
}

document.getElementById("upload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    userAtual.foto = reader.result;
    salvar();
    foto.src = reader.result;
  }

  reader.readAsDataURL(file);
});

/* FUNÇÕES */
function salvar() {
  localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

function atualizar() {
  document.getElementById("saldo").innerText = userAtual.saldo;
}

function depositar() {
  let valor = Number(document.getElementById("valor").value);
  if (valor <= 0) return;

  userAtual.saldo += valor;
  salvar();
  atualizar();
}

function sacar() {
  let valor = Number(document.getElementById("valor").value);
  if (valor <= 0) return;

  if (userAtual.saldo < valor) {
    alert("Saldo insuficiente");
    return;
  }

  userAtual.saldo -= valor;
  salvar();
  atualizar();
}

function logout() {
  localStorage.removeItem("logado");
  window.location.href = "index.html";
}

function ir(pagina) {
  window.location.href = pagina;
}
</script>

</body>
</html>
