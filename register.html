<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">
  
  <h1 class="title">Criar Conta</h1>

  <div class="card">

    <input type="text" id="user" placeholder="Usuário (até 15)">
    <input type="password" id="senha" placeholder="Senha (até 10)">

    <button class="btn" onclick="criarConta()">Criar</button>

    <p id="msg"></p>

    <a href="index.html">Voltar</a>

  </div>

</div>

<script src="js/app.js"></script>

<script>
function gerarNumero() {
  return Math.floor(Math.random() * 900 + 100);
}

function gerarCartao() {
  return `${gerarNumero()}-${gerarNumero()}-${gerarNumero()}-${Math.floor(Math.random()*90+10)}`;
}

function gerarIGG() {
  return 'IGG-' + Math.random().toString(36).substring(2, 10).toUpperCase();
}

function criarConta() {
  const user = document.getElementById("user").value.trim();
  const senha = document.getElementById("senha").value.trim();
  const msg = document.getElementById("msg");

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

  if (usuarios.find(u => u.user === user)) {
    msg.innerText = "Usuário já existe";
    return;
  }

  usuarios.push({
    user,
    senha,
    saldo: 0,
    historico: [],
    igg: gerarIGG(),
    cartao: gerarCartao(),
    foto: ""
  });

  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  msg.innerText = "Conta criada!";
}
</script>

</body>
</html>
